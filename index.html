<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TaskFlow | Modern Task Manager</title>

  <link rel="stylesheet" href="style.css">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

  <!-- ================= NAVBAR ================= -->

  <nav>
    <div class="nav-left">
      <img src="logo.png" alt="TaskFlow Logo">
      <h2 class="logo">TaskFlow</h2>
    </div>
  </nav>

  <!-- ================= MAIN ================= -->

  <main class="app">
    <section class="todo-container">
      <div class="header">
        <img src="logo.png" alt="logo">
        <h1>TaskFlow</h1>
        <p>Stay organized and productive every day.</p>
      </div>

      <!-- Search -->

      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchTask" placeholder="Search tasks...">
      </div>

      <!-- Add Task -->

      <form class="task-form">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <input type="date" id="dueDate">
        <select id="priority">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
        </select>

        <button id="addTask">
          <i class="fa-solid fa-plus"></i>
        </button>
      </form>

      <!-- Filters -->

      <div class="toolbar">

        <div class="filters">
          <button class="filter-btn active">All</button>
          <button class="filter-btn">Active</button>
          <button class="filter-btn">Completed</button>
        </div>

        <button class="clear-btn">
          <i class="fa-solid fa-trash"></i>
          Clear Completed
        </button>

      </div>

      <!-- Stats -->

      <div class="stats">
        <div>
          <i class="fa-solid fa-list-check"></i>
          <span id="taskCount">0 Tasks</span>
        </div>

        <div>
          <i class="fa-solid fa-clock"></i>
          <span id="clock"></span>
        </div>
      </div>

      <!-- Task List -->

      <ul class="task-list"></ul>

      <!-- Empty State -->

      <div class="empty-state">
        <i class="fa-regular fa-clipboard"></i>
        <h3>No Tasks Yet</h3>
        <p>Add your first task to start being productive.</p>
      </div>

    </section>
  </main>

  <!-- ================= FOOTER ================= -->

  <footer>
    <div>
      © 2026
      <span class="brand">TaskFlow</span>
      All rights reserved.
    </div>
  </footer>

  <script src="script.js"></script>

</body>
</html>
